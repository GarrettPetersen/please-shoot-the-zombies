<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Please Shoot the Zombies</title>
  <style>
    @font-face {
      font-family: 'Zpix';
      src: url('assets/font/zpix.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'Gogozombie';
      src: url('assets/font/gogozombie.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'Tally Mark';
      src: url('assets/font/Tally%20Mark.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0d0d0d;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    canvas {
      display: block;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #world3d { z-index: 0; pointer-events: none; }
    #game { z-index: 1; }
  </style>
</head>
<body>
  <canvas id="world3d"></canvas>
  <canvas id="game"></canvas>
  <!-- Three.js UMD; copied from node_modules (postinstall) so Electron loadFile() can resolve it -->
  <script src="lib/three.min.js"></script>
  <script src="src/render/materials.js"></script>
  <script src="src/render/geometry/bunker.js"></script>
  <script src="src/render/entities/sprites.js"></script>
  <script src="src/render/renderer3d.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
